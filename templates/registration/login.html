{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - Capacitaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background: url("{% static 'img/logo3.png' %}") no-repeat center center fixed;
        background-size: cover;
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-wrapper {
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
    }
    .portal-title{
    color:#02060c;
    letter-spacing:1px;
    font-size:26px;
    font-weight:700;
}

.portal-subtitle{
    color:#6c757d;
    font-size:14px;
    letter-spacing:0.5px;
}

.title-line{
    width:60px;
    height:3px;
    background:#babcc0;
    margin:8px auto 10px auto;
    border-radius:3px;
}
</style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="login-wrapper shadow-lg p-4">

   <div class="text-center mb-4">

    <h2 class="fw-bold portal-title">
        PORTAL DE TELESALUD
    </h2>

    <div class="title-line"></div>

    <small class="portal-subtitle">
        Acceso al sistema institucional
    </small>

</div>
    <form method="post" class="text-center">
        {% csrf_token %}
        
        <div class="mb-3 d-flex justify-content-center">
            <div style="width: 85%;">
                <label class="form-label fw-semibold d-block text-start">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light">👤</span>
                    {{ form.username }}
                </div>
            </div>
        </div>

        <div class="mb-3 d-flex justify-content-center">
            <div style="width: 85%;">
                <label class="form-label fw-semibold d-block text-start">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light">🔒</span>
                    {{ form.password }}
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center mt-3">
            <div style="width: 85%;">
                <button type="submit" class="btn btn-primary w-100 fw-semibold shadow-sm">
                    Ingresar
                </button>
            </div>
        </div>
    </form>

    {% if form.errors %}
        <div class="alert alert-danger mt-3 text-center">
            Usuario o contraseña incorrectos.
        </div>
    {% endif %}

    <div class="text-center mt-4">
        <small class="text-muted">
            © 2026 - Sistema de Telesalud
        </small>
    </div>

</div>

</body>
</html>
