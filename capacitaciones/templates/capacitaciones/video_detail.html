{% extends 'capacitaciones/base.html' %}

{% block title %}{{ video.titulo }}{% endblock %}

{% block content %}

<h2>{{ video.titulo }}</h2>
<p class="text-muted">
    Subido el {{ video.fecha_subida|date:"d/m/Y H:i" }}
</p>

<hr>

<div class="card p-3 shadow-sm">

    <video width="100%" controls preload="auto">
        <source src="{{ video.archivo.url }}" type="video/mp4">
        Tu navegador no soporta videos.
    </video>

    <p class="mt-3">
        {{ video.descripcion }}
    </p>

</div>

<br>


<a href="{% url 'video_list' %}" class="btn btn-primary">
    Volver
</a>

{% if user.is_staff %}
    <a href="{% url 'video_update' video.pk %}" class="btn btn-warning">
        ✏ Editar
    </a>
    <a href="{% url 'video_delete' video.id %}" class="btn btn-danger">
        🗑 Eliminar
    </a>
{% endif %}


 
{% endblock %}
