{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Capacitaciones{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #ffffff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .sidebar h4 {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .sidebar a {
            text-decoration: none;
            color: #333;
            display: block;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background-color: #e9ecef;
        }

        .content {
            margin-left: 260px;
            padding: 30px;
        }

        .video-card {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            background: white;
        }

        .video-card:hover {
            transform: translateY(-5px);
        }

        .thumbnail {
            height: 180px;
            object-fit: cover;
            width: 100%;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar text-center">

    <!-- Logo directo por URL -->
    <img src="http://10.0.0.8:8000/staticfiles/img/logominsa.png"
         alt="Logo MINSA"
         class="img-fluid mb-3"
         style="max-width: 180px;">

    <h4>👩🏻‍💻 Capacitaciones</h4>
    <hr>

    <a href="{% url 'video_list' %}">🏠 Inicio</a>

    {% if user.is_staff %}
        <a href="{% url 'video_create' %}">⬆ Subir Video</a>
    {% endif %}

    <hr>

    <p class="small text-muted">
        Usuario: {{ user.username }}
    </p>

    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-link p-0">
            Cerrar sesión
        </button>
    </form>

</div>



<!-- Contenido -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
